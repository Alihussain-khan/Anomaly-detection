@for (metric of metrics; track metric.key) {
  <div class="panel">
    <div class="panel-header">
      <span class="panel-dot" [style.background]="metric.color"></span>
      <span class="panel-label">{{ metric.label }}</span>
    </div>

    <svg
      class="chart"
      [attr.viewBox]="viewBox"
      preserveAspectRatio="none"
      role="img"
      [attr.aria-label]="'Live ' + metric.label + ' readings'"
    >
      <defs>
        <filter [attr.id]="glowFilterId(metric)" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <path
        class="metric-line"
        [attr.d]="pathFor(metric)"
        [style.d]="cssPathFor(metric)"
        [attr.stroke]="colorFor(metric)"
      />

      @let points = pointsFor(metric);
      @for (point of points; track $index) {
        <text
          class="value-label"
          text-anchor="middle"
          [attr.x]="point.x"
          [attr.y]="labelYFor(point, $index, points)"
          [style.x.px]="point.x"
          [style.y.px]="labelYFor(point, $index, points)"
          [attr.fill]="labelColorFor(metric, point)"
        >{{ point.value.toFixed(metric.decimals) }}</text>
      }

      @let tip = tipFor(metric);
      @if (tip) {
        <circle
          class="glow-dot"
          [attr.filter]="'url(#' + glowFilterId(metric) + ')'"
          r="4"
          [attr.cx]="tip.x"
          [attr.cy]="tip.y"
          [style.cx.px]="tip.x"
          [style.cy.px]="tip.y"
          [attr.fill]="tipColorFor(metric)"
        />
      }

      @for (ripple of ripplesFor(metric); track ripple.id) {
        <circle
          class="ripple"
          [attr.cx]="ripple.cx"
          [attr.cy]="ripple.cy"
          [attr.stroke]="metric.color"
          (animationend)="removeRipple(ripple.id)"
        />
      }
    </svg>
  </div>
}
