@for (metric of metrics; track metric.key) {
  <div class="panel">
    <div class="panel-header">
      <span class="panel-dot" [style.background]="metric.color"></span>
      <span class="panel-label">{{ metric.label }}</span>
    </div>

    <plotly-plot
      [data]="dataFor(metric)"
      [layout]="layoutFor(metric)"
      [config]="config"
      [style]="plotStyle"
      [useResizeHandler]="true"
    ></plotly-plot>
  </div>
}
