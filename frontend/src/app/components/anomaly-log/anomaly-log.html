<ul class="log">
  @if (rows().length === 0) {
    <li class="empty-message">No anomalies yet.</li>
  } @else {
    @for (row of rows(); track row.id) {
      <li class="entry">
        <span class="time">{{ row.time }}</span>
        <span class="detail">{{ row.detail }}</span>
        <span class="detectors">{{ row.detectors }}</span>
      </li>
    }
  }
</ul>
