<div class="page">
  <app-control-deck />

  <header class="header">
    <h1 class="title">Aqua Watch</h1>
    <span class="status" [class]="'status status--' + replay.status()">
      <span class="status-dot"></span>
      <span class="status-label">{{ statusLabel() }}</span>
    </span>
  </header>

  <main class="content">
    @if (replay.status() === 'idle') {
      <p class="idle-prompt">Open the control deck and start a replay to watch the tank.</p>
    } @else {
      @if (replay.status() === 'connected' || replay.paused()) {
        <div class="playback-controls">
          <button type="button" class="playback-btn" (click)="togglePause()">
            {{ replay.paused() ? 'Resume' : 'Pause' }}
          </button>
          @if (replay.paused()) {
            <button type="button" class="playback-btn playback-btn--sync" (click)="replay.sync()">
              Sync
            </button>
          }
        </div>
      }

      <app-numeric-readout
        [latest]="replay.latest()"
        [anomalyCount]="replay.anomalyCount()"
        [sensorFaultCount]="replay.sensorFaultCount()"
      />

      <section class="log-panel">
        <h2 class="section-label">Anomaly log</h2>
        <app-anomaly-log [entries]="replay.anomalyLog()" kind="anomaly" emptyMessage="No anomalies yet." />
      </section>

      <section class="log-panel">
        <h2 class="section-label">Sensor fault log</h2>
        <app-anomaly-log
          [entries]="replay.sensorFaultLog()"
          kind="fault"
          emptyMessage="No sensor faults yet."
        />
      </section>

      <app-aqua-chart [readings]="replay.window()" />
    }
  </main>
</div>
