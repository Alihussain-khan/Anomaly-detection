<div class="page">
  <app-control-deck />

  <header class="header">
    <h1 class="title">Aqua Watch</h1>
    <span class="status" [class]="'status status--' + replay.status()">
      <span class="status-dot"></span>
      <span class="status-label">{{ statusLabel() }}</span>
    </span>
  </header>

  <main class="content">
    @if (replay.status() === 'idle') {
      <p class="idle-prompt">Open the control deck and start a replay to watch the tank.</p>
    } @else {
      <app-aqua-chart [readings]="replay.window()" />

      <app-numeric-readout [latest]="replay.latest()" [anomalyCount]="replay.anomalyCount()" />

      <section class="log-panel">
        <h2 class="section-label">Anomaly log</h2>
        <app-anomaly-log [entries]="replay.anomalyLog()" />
      </section>
    }
  </main>
</div>
